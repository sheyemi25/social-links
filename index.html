<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Social links profile</title>
    >
    <link rel="stylesheet" href="social-link.css" />
  </head>
  <body>
    <div class="conainer">
      <div class="image">
        <img  class="profile-pics" src="assets/images/avatar-jessica.jpeg" />
      </div>

      <div class="details">
        <p class="name">Jessica Randall</p>
        <p class="nationality">London, United Kingdom</p>
        <p class="specialization">"Front-end developer and avid reader."</p>
      </div>

      <div class="social-button">
        <button class="buttons">
          GitHub 
        </buttom>
        
        <button class="buttons">
         Frontend Mentor
        </buttom>

        <button class="buttons">
         LinkedIn
        </buttom>

        <button class="buttons">
          Twitter
        </buttom>

        <button class="buttons">
          Instagram
        </buttom>
      </div>       
    </div>
  </body>

  <footer class="attribution">
  Challenge by
  <a class="attribution" href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
  Coded by <a class="attribution" href="#">Oluwaseyi Olayemi</a>.
  </footer>
</html>
